apply plugin: 'com.android.application'

android {
    compileSdkVersion 33
    buildToolsVersion "33.0.0"

    defaultConfig {
        applicationId "com.darkuganda.iwbtf"
        minSdkVersion 32
        targetSdkVersion 34
        versionCode 35
        versionName "1.5"
    }

    signingConfigs {
        release {
            storeFile file("../../../../release.keystore")
            storePassword "123456"
            keyAlias "release"
            keyPassword "123456"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
            debuggable false
        }
    }
}